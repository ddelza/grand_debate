<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026 대토론회 의견 모음</title>
<style>
  :root {
    --student: #4a90d9;
    --parent: #e0884a;
    --teacher: #5fa777;
    --bg: #f5f6f8;
    --card: #ffffff;
    --text: #2c2f33;
    --muted: #8a8f98;
    --border: #e4e7eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: #2c2f33;
    color: #fff;
    padding: 20px 16px 14px;
    text-align: center;
  }
  header h1 { margin: 0 0 4px; font-size: 1.25rem; }
  header p { margin: 0; font-size: 0.8rem; color: #b7bbc1; }

  .tabs {
    display: flex;
    gap: 6px;
    padding: 12px 12px 0;
    max-width: 760px;
    margin: 0 auto;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 4px;
    border: none;
    border-radius: 10px 10px 0 0;
    background: #e9ebee;
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }
  .tab-btn.active { background: var(--card); color: var(--text); }
  .tab-btn[data-subject="학생"].active { border-bottom: 3px solid var(--student); color: var(--student); }
  .tab-btn[data-subject="학부모"].active { border-bottom: 3px solid var(--parent); color: var(--parent); }
  .tab-btn[data-subject="교사"].active { border-bottom: 3px solid var(--teacher); color: var(--teacher); }

  .filters {
    max-width: 760px;
    margin: 0 auto;
    background: var(--card);
    padding: 12px 12px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--muted);
    font-size: 0.82rem;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .filter-btn.active {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }

  .summary {
    max-width: 760px;
    margin: 0 auto;
    padding: 10px 16px 0;
    font-size: 0.8rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .sort-controls {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .sort-controls select {
    font-size: 0.78rem;
    padding: 5px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
  }
  .sort-dir-btn {
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    border-radius: 8px;
    padding: 5px 9px;
    font-size: 0.82rem;
    cursor: pointer;
  }
  .sort-dir-btn:hover { background: #f1f2f4; }

  .download-btn {
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    border-radius: 8px;
    padding: 5px 11px;
    font-size: 0.78rem;
    cursor: pointer;
  }
  .download-btn:hover { background: #f1f2f4; }

  .content {
    max-width: 760px;
    margin: 0 auto;
    padding: 12px 12px 60px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .card.agenda-1 { background: #eef5ff; border-left-color: #9ec5f2; }
  .card.agenda-2 { background: #fff3e9; border-left-color: #f3bd8e; }
  .card.agenda-3 { background: #eafaf1; border-left-color: #97d6ae; }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .badge {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    color: #fff;
  }
  .badge.학생 { background: var(--student); }
  .badge.학부모 { background: var(--parent); }
  .badge.교사 { background: var(--teacher); }

  .agenda-tag {
    font-size: 0.72rem;
    color: var(--muted);
  }

  .opinion-text {
    font-size: 0.92rem;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .meta-toggle {
    margin-top: 8px;
    font-size: 0.74rem;
    color: #aab0b8;
    cursor: pointer;
    user-select: none;
    display: inline-block;
  }
  .meta-toggle:hover { color: var(--muted); }
  .meta-info {
    display: none;
    margin-top: 6px;
    font-size: 0.78rem;
    color: var(--muted);
    background: #f1f2f4;
    border-radius: 8px;
    padding: 6px 10px;
  }
  .meta-info.show { display: block; }

  .empty-msg {
    text-align: center;
    color: var(--muted);
    padding: 40px 0;
    font-size: 0.9rem;
  }
  .loading { text-align: center; padding: 40px 0; color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>2026학년도 대토론회 학교 공통의제</h1>
  <p>학생 · 학부모 · 교사 의견 모음</p>
</header>

<div class="tabs" id="tabs">
  <button class="tab-btn" data-subject="학생">학생</button>
  <button class="tab-btn" data-subject="학부모">학부모</button>
  <button class="tab-btn" data-subject="교사">교사</button>
</div>

<div class="filters" id="filters">
  <button class="filter-btn" data-agenda="0">전체</button>
  <button class="filter-btn" data-agenda="1">소통과 존중</button>
  <button class="filter-btn" data-agenda="2">자율과 조율</button>
  <button class="filter-btn" data-agenda="3">배움과 평화</button>
</div>

<div class="summary">
  <span id="summaryText"></span>
  <span class="sort-controls">
    <select id="sortKey">
      <option value="timestamp">최신순</option>
      <option value="length">글자수</option>
    </select>
    <button class="sort-dir-btn" id="sortDirBtn" title="정렬 방향 전환">↓</button>
    <button class="download-btn" id="downloadBtn">⬇ 엑셀로 다운로드</button>
  </span>
</div>

<div class="content" id="content">
  <div class="loading">의견을 불러오는 중...</div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuFuQjV3ZbHha75T75v7l2aXSMjMJKRivTPB_4owHqF_NkRvQmuW8ppYzk2u-1ohiN/exec';

function callApi(action, params) {
  return new Promise((resolve, reject) => {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      const runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
      if (action === 'getOpinions') runner.getOpinions();
      else reject(new Error('callApi: unhandled action — ' + action));
    } else {
      const url = new URL(APPS_SCRIPT_URL);
      url.searchParams.set('action', action);
      if (params) Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      fetch(url.toString())
        .then(r => r.json())
        .then(d => { if (d && d.error) reject(new Error(d.error)); else resolve(d); })
        .catch(reject);
    }
  });
}

let ALL_OPINIONS = [];
let currentSubject = '학생';
let currentAgenda = 0; // 0 = 전체
let sortKey = 'timestamp'; // 'timestamp' | 'length'
let sortDir = 'desc'; // 'asc' | 'desc'
let currentList = [];

function render() {
  const content = document.getElementById('content');
  const summaryText = document.getElementById('summaryText');

  let list = ALL_OPINIONS.filter(o => o.subject === currentSubject);
  if (currentAgenda !== 0) list = list.filter(o => o.agendaIndex === currentAgenda);

  list = list.slice().sort((a, b) => {
    const av = sortKey === 'length' ? a.content.length : (a.timestampMs || 0);
    const bv = sortKey === 'length' ? b.content.length : (b.timestampMs || 0);
    return sortDir === 'asc' ? av - bv : bv - av;
  });

  currentList = list;
  summaryText.textContent = `${currentSubject} 의견 ${list.length}건`;

  if (list.length === 0) {
    content.innerHTML = '<div class="empty-msg">해당하는 의견이 없습니다.</div>';
    return;
  }

  content.innerHTML = list.map((o, i) => {
    const metaParts = [];
    if (o.subject === '학생' && o.grade) metaParts.push(`${o.grade}학년`);
    if (o.subject === '학부모') {
      if (o.grade) metaParts.push(`자녀 학년: ${o.grade}`);
      if (o.attend) metaParts.push(`대토론회 참석: ${o.attend}`);
      if (o.name) metaParts.push(`작성자: ${o.name}`);
    }
    const hasMeta = metaParts.length > 0;

    return `
      <div class="card agenda-${o.agendaIndex}">
        <div class="card-head">
          <span class="badge ${o.subject}">${o.subject}</span>
          <span class="agenda-tag">[세부의제 ${o.agendaIndex}] ${o.agendaLabel}</span>
        </div>
        <div class="opinion-text">${escapeHtml(o.content)}</div>
        ${hasMeta ? `
          <span class="meta-toggle" onclick="toggleMeta(${i})">▸ 응답자 정보 보기</span>
          <div class="meta-info" id="meta-${i}">${metaParts.join(' · ')}</div>
        ` : ''}
      </div>
    `;
  }).join('');
}

function toggleMeta(i) {
  const el = document.getElementById('meta-' + i);
  el.classList.toggle('show');
  const toggle = el.previousElementSibling;
  toggle.textContent = el.classList.contains('show') ? '▾ 응답자 정보 숨기기' : '▸ 응답자 정보 보기';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  currentSubject = btn.dataset.subject;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  currentAgenda = parseInt(btn.dataset.agenda, 10);
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

document.getElementById('sortKey').addEventListener('change', e => {
  sortKey = e.target.value;
  render();
});

document.getElementById('sortDirBtn').addEventListener('click', () => {
  sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  document.getElementById('sortDirBtn').textContent = sortDir === 'asc' ? '↑' : '↓';
  render();
});

document.getElementById('downloadBtn').addEventListener('click', downloadCsv);

function csvCell(v) {
  const s = String(v == null ? '' : v).replace(/\r?\n/g, ' ');
  return '"' + s.replace(/"/g, '""') + '"';
}

function downloadCsv() {
  if (!currentList.length) { alert('다운로드할 의견이 없습니다.'); return; }

  const headers = ['주체', '세부의제', '의견 내용', '학년/자녀학년', '참석여부', '작성자', '응답시각'];
  const rows = currentList.map(o => [
    o.subject,
    `[세부의제 ${o.agendaIndex}] ${o.agendaLabel}`,
    o.content,
    o.grade || '',
    o.attend || '',
    o.name || '',
    o.timestamp || ''
  ]);

  const csv = [headers, ...rows].map(r => r.map(csvCell).join(',')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const fname = `대토론회_의견_${currentSubject}_${new Date().toISOString().slice(0,10)}.csv`;
  a.href = url;
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// 초기 활성 탭/필터 표시
document.querySelector('.tab-btn[data-subject="학생"]').classList.add('active');
document.querySelector('.filter-btn[data-agenda="0"]').classList.add('active');

callApi('getOpinions').then(data => {
  ALL_OPINIONS = data.opinions || [];
  render();
}).catch(err => {
  document.getElementById('content').innerHTML =
    '<div class="empty-msg">의견을 불러오지 못했습니다.<br>' + err.message + '</div>';
});
</script>

</body>
</html>
